<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alege Materia</title>
  <link rel="stylesheet" href="style.css?v=2">
  <script src="config.js"></script>
</head>
<body>
  <h1>ALEGE MATERIA</h1>
  <div id="courseButtons" class="container"></div>

  <script>
    const container = document.getElementById('courseButtons');
    
    // Verificăm dacă COURSES există în config.js
    if (typeof COURSES !== 'undefined') {
      Object.values(COURSES).forEach(course => {
        const button = document.createElement('button');
        button.textContent = course.name;
        button.className = 'course-btn'; // Clasă pentru stilizare ușoară
        button.onclick = () => {
          location.href = `materie.html?course=${course.id}`;
        };
        container.appendChild(button);
      });
    } else {
      container.innerHTML = "<p style='color:red;'>Eroare: Nu s-a putut încărca lista de cursuri din config.js</p>";
    }
  </script>
</body>
</html>
